<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="./bootstrap-5.3.7-dist/css/bootstrap.css">
    <script src="./bootstrap-5.3.7-dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <h1>carousel</h1>
    <div class="container border border-dark p-5 bg-warning">
        <div id="carousel" class="carousel slide">
            <div class="carousel-inner">
                <div class="carousel-item">
                    <img src="./media/bckend.png" class="d-block w-150">
                </div>
                <div class="carousel-item">
                    <img src="./media/dsa.png" class="d-block w-150">
                </div>
                <div class="carousel-item active">
                    <img src="./media/fsd.jpg" class="d-block w-150">
                </div>
                <div class="carousel-item">
                    <img src="./media/interview.png" class="d-block w-150">
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon bg-success"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carousel" data-bs-slide="next">
                <span class="carousel-control-next-icon bg-success"></span>
            </button>
        </div>
    </div>
</body>

</html>
