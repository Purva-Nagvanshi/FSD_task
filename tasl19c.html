<!DOCTYPE html>
<html lang="en">
<head>
     <link rel="stylesheet" href="bootstrap-5.3.7-dist/css/bootstrap.css">
     <script src="bootstrap-5.3.7-dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<h1>progress</h1>    
  <div class="progress" type="progressbar" aria-label="Basic example" aria-valuenow="40" aria-valuemin="0" aria-valuemax="100">
       <div class="progress-bar"style="width: 40%">40%</div>
  </div><hr>
  <div class="progress" type="progressbar" aria-label="Example 1px high" aria-valuenow="40" aria-valuemin="0" aria-valuemax="100" style="height: 5px">
       <div class="progress-bar bg-warning" style="width: 50%"></div>
  </div><hr>
  <div class="progress" type="progressbar" aria-label="Danger example" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100">
       <div class="progress-bar bg-success" style="width: 75%">75%</div>
  </div><hr>
  <div class="progress" type="progressbar" aria-label="Default striped example" aria-valuenow="10" aria-valuemin="0" aria-valuemax="100">
       <div class="progress-bar progress-bar-striped" style="width: 50%"></div>
  </div><hr><hr>
<h1>spinners</h1>  
  <div class="spinner-border m-5" type="status">
     <span class="visually-hidden">load..</span>
  </div>
  <div class="d-flex justify-content-center">
     <div class="spinner-grow bg-warning" type="status">
        <span class="visually-hidden">Load..</span>
     </div>
  </div>
  <button class="btn btn-success" type="button" disabled>
     <span class="spinner-border" aria-hidden="true"></span>
  </button><hr><hr>
<h1>alert</h1> 
   <div class="alert alert-dark" type="alert">
     alert!
   </div><hr>
   <div class="alert alert-dark" type="alert">
       alert with <a href="#" class="alert-link">link</a>
   </div>
<h1>badge</h1>
  <button type="button" class="btn btn-warning">
    message<span class="badge text-bg-dark">50+</span>
  </button><hr> 
  <button type="button" class="btn btn-secondary position-relative">
     notification
     <span class="position-absolute top-10 start-100 translate-middle p-2 bg-success border border-light">
       <span class="visually-hidden">New alerts</span>
     </span>
  </button>  
</body>
</html>
